name: Security

on:
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "package-lock.json"
      - "package.json"
      - ".github/workflows/security.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "package-lock.json"
      - "package.json"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Audit npm dependencies
        run: npm audit --omit=optional --audit-level=moderate

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        run: cargo audit
