name: Security

on:
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "package-lock.json"
      - "package.json"
      - "scripts/check-secrets.js"
      - "scripts/install-cargo-audit.js"
      - ".github/workflows/security.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "package-lock.json"
      - "package.json"
      - "scripts/check-secrets.js"
      - "scripts/install-cargo-audit.js"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.2-${{ runner.os }}-${{ runner.arch }}

      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci --omit=optional

      - name: Check tracked files for secrets
        timeout-minutes: 5
        run: npm run check:secrets

      - name: Audit npm dependencies
        timeout-minutes: 10
        run: npm audit --omit=optional --audit-level=moderate

      - name: Install cargo-audit
        timeout-minutes: 10
        run: npm run install:cargo-audit

      - name: Audit Rust dependencies
        timeout-minutes: 10
        run: cargo audit
