name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm after building and packing all artifacts"
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag"
        type: choice
        default: alpha
        options:
          - alpha
          - next
          - latest

permissions:
  contents: read

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      npm_tag: ${{ steps.release.outputs.npm_tag }}
      should_publish: ${{ steps.release.outputs.should_publish }}
      publication_state: ${{ steps.publication.outputs.state }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Check package metadata consistency
        run: npm run check:metadata

      - name: Resolve release version
        id: release
        env:
          INPUT_NPM_TAG: ${{ github.event.inputs.npm_tag }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            expected="v${version}"
            if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
              echo "::error::tag ${GITHUB_REF_NAME} does not match package version ${version}"
              exit 1
            fi
          fi

          npm_tag="${INPUT_NPM_TAG:-}"
          if [[ -z "${npm_tag}" ]]; then
            if [[ "${version}" == *-* ]]; then
              npm_tag="next"
            else
              npm_tag="latest"
            fi
          fi

          should_publish="false"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            should_publish="true"
          elif [[ "${INPUT_PUBLISH:-false}" == "true" ]]; then
            should_publish="true"
          fi

          {
            echo "version=${version}"
            echo "npm_tag=${npm_tag}"
            echo "should_publish=${should_publish}"
          } >> "${GITHUB_OUTPUT}"
          echo "Release ${version}, npm tag ${npm_tag}, publish ${should_publish}"

      - name: Resolve npm publication state
        id: publication
        if: steps.release.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          node scripts/check-release-publication-state.js --tag "${{ steps.release.outputs.npm_tag }}" --json | tee publication-state.json
          state="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('publication-state.json', 'utf8')).state)")"
          echo "state=${state}" >> "${GITHUB_OUTPUT}"
          echo "npm publication state: ${state}"

      - name: Check provenance repository metadata
        if: steps.release.outputs.should_publish == 'true'
        run: npm run check:release-repository -- --require-github-match

  build-native:
    name: Build native / ${{ matrix.package }}
    needs: validate
    if: ${{ needs.validate.outputs.publication_state != 'published' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            package: linux-arm64-gnu
            cross: true
          - target: x86_64-unknown-linux-musl
            package: linux-x64-musl
            cross: true
          - target: aarch64-unknown-linux-musl
            package: linux-arm64-musl
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26
          package-manager-cache: false

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig for cross builds
        if: matrix.cross
        timeout-minutes: 5
        run: node scripts/install-zig.js --version 0.13.0

      - name: Cache cargo-zigbuild
        if: matrix.cross
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-0.23.0-${{ runner.os }}-${{ runner.arch }}

      - name: Install cargo-zigbuild
        if: matrix.cross
        timeout-minutes: 10
        run: npm run install:cargo-zigbuild

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Build native target
        run: |
          set -euo pipefail
          args=(--release --strip --platform --target "${{ matrix.target }}" --js native.js --dts native.d.ts)
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            args+=(--cross-compile)
          fi
          npx napi build "${args[@]}"

      - name: Stage native artifact
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.package }}"
          cp ferrings.*.node "dist/${{ matrix.package }}/"
          file "dist/${{ matrix.package }}"/*.node
          find "dist/${{ matrix.package }}" -maxdepth 1 -type f | sort

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.package }}
          path: dist/${{ matrix.package }}/
          if-no-files-found: error

  quality-gate:
    name: Release quality gate
    needs: validate
    if: ${{ needs.validate.outputs.publication_state != 'published' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends strace

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Check Rust format
        run: cargo fmt -- --check

      - name: Check Rust lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Run test suite
        timeout-minutes: 15
        run: npm test

      - name: Audit dependencies
        timeout-minutes: 15
        run: npm run audit:deps

  package-and-publish:
    name: Package and publish
    needs:
      - validate
      - quality-gate
      - build-native
    if: >-
      ${{ always() &&
          needs.validate.result == 'success' &&
          (needs.quality-gate.result == 'success' ||
            (needs.quality-gate.result == 'skipped' &&
              needs.validate.outputs.publication_state == 'published')) &&
          (needs.build-native.result == 'success' ||
            (needs.build-native.result == 'skipped' &&
              needs.validate.outputs.publication_state == 'published')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Download native artifacts
        if: needs.build-native.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: artifacts
          merge-multiple: false

      - name: Prepare npm package directories
        if: needs.build-native.result == 'success'
        run: |
          set -euo pipefail
          find artifacts -type f -name "*.node" -print | sort
          npm run artifacts
          find npm -maxdepth 2 -type f | sort

      - name: Validate native package metadata and contents
        if: needs.build-native.result == 'success'
        run: npm run check:metadata && node scripts/check-native-packages.js --require-binary

      - name: Check napi prepublish dry-run
        if: needs.build-native.result == 'success'
        run: npm run check:prepublish

      - name: Check npm publish dry-run
        if: >-
          needs.build-native.result == 'success' &&
          needs.validate.outputs.should_publish == 'true' &&
          needs.validate.outputs.publication_state == 'available'
        run: npm run check:publish

      - name: Upload prepared npm packages
        if: needs.build-native.result == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages-${{ needs.validate.outputs.version }}
          path: |
            package.json
            ferrings.*.node
            native.js
            native.d.ts
            npm/
          if-no-files-found: error

      - name: Publish npm packages
        if: >-
          needs.build-native.result == 'success' &&
          needs.validate.outputs.should_publish == 'true' &&
          needs.validate.outputs.publication_state != 'published'
        timeout-minutes: 15
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_TAG: ${{ needs.validate.outputs.npm_tag }}
        run: node scripts/publish-npm-packages.js --tag "${{ needs.validate.outputs.npm_tag }}" --retries 2 --retry-delay-ms 5000

      - name: Verify published npm packages
        if: needs.validate.outputs.should_publish == 'true'
        timeout-minutes: 15
        run: npm run check:published -- --tag "${{ needs.validate.outputs.npm_tag }}" --verify-tarballs --retries 12 --retry-delay-ms 5000

      - name: Smoke test registry install
        if: needs.validate.outputs.should_publish == 'true'
        timeout-minutes: 15
        run: npm run check:registry-install -- --version "${{ needs.validate.outputs.version }}" --retries 12 --retry-delay-ms 5000

      - name: Create or update GitHub release
        if: needs.validate.outputs.should_publish == 'true' && github.ref_type == 'tag'
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          create_args=("${tag}" --title "${tag}" --generate-notes --verify-tag)
          edit_args=("${tag}" --title "${tag}")

          if [[ "${VERSION}" == *-* ]]; then
            create_args+=(--prerelease --latest=false)
            edit_args+=(--prerelease)
          else
            create_args+=(--latest)
            edit_args+=(--latest)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${edit_args[@]}"
          else
            gh release create "${create_args[@]}"
          fi

          gh release view "${tag}" --json tagName,name,url,isDraft,isPrerelease,publishedAt,targetCommitish
